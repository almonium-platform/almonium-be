name: Reusable Deploy BE

on:
    workflow_call:
        inputs:
            environment_name:
                required: true
                type: string
            image_tag:
                required: true
                type: string
        secrets:
            INFRA_REPO_CHECKOUT_KEY:
                required: true
            CLOUD_KEY:
                required: true
            ANSIBLE_VAULT_PASSWORD_ALL:
                required: true
            ANSIBLE_VAULT_PASSWORD_ALMONIUM_SHARED:
                required: true
            ANSIBLE_VAULT_PASSWORD_ALMONIUM_PROD:
                required: true
            ANSIBLE_VAULT_PASSWORD_ALMONIUM_STAGING:
                required: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment_name }}
        permissions:
            packages: read
        steps:
            - name: Checkout almonium-infra repository
              uses: actions/checkout@v6
              with:
                  repository: almonium-platform/almonium-infra
                  path: almonium-infra
                  ssh-key: ${{ secrets.INFRA_REPO_CHECKOUT_KEY }}

            -   name: Prepare vault password files
                shell: bash
                run: |
                    set -euo pipefail
                    
                    mkdir -p ~/.ansible
                    umask 077
                    
                    printf "%s" "${{ secrets.ANSIBLE_VAULT_PASSWORD_ALL }}" > ~/.ansible/vault-all
                    printf "%s" "${{ secrets.ANSIBLE_VAULT_PASSWORD_ALMONIUM_SHARED }}" > ~/.ansible/vault-almonium-shared
                    
                    if [ "${{ inputs.environment_name }}" = "prod" ]; then
                      printf "%s" "${{ secrets.ANSIBLE_VAULT_PASSWORD_ALMONIUM_PROD }}" > ~/.ansible/vault-almonium-env
                      echo "ALMONIUM_ENV_VAULT_ID=almonium_prod" >> "$GITHUB_ENV"
                    else
                      printf "%s" "${{ secrets.ANSIBLE_VAULT_PASSWORD_ALMONIUM_STAGING }}" > ~/.ansible/vault-almonium-env
                      echo "ALMONIUM_ENV_VAULT_ID=almonium_staging" >> "$GITHUB_ENV"
                    fi

            -   name: Run Ansible Playbook
                uses: dawidd6/action-ansible-playbook@v4
                with:
                    playbook: playbook-deploy-almonium-be.yaml
                    directory: almonium-infra/ansible
                    key: ${{ secrets.CLOUD_KEY }}
                    options: |
                        -i inventory/hosts.ini
                        --limit almonium
                        --vault-id all@/home/runner/.ansible/vault-all
                        --vault-id almonium_shared@/home/runner/.ansible/vault-almonium-shared
                        --vault-id ${{ env.ALMONIUM_ENV_VAULT_ID }}@/home/runner/.ansible/vault-almonium-env
                        --extra-vars deploy_environment=${{ inputs.environment_name }}
                        --extra-vars deploy_image_tag=${{ inputs.image_tag }}
                        --extra-vars deploy_gh_actor=${{ github.actor }}
                        --extra-vars deploy_gh_token=${{ secrets.GITHUB_TOKEN }}
